<div class="flex min-h-screen w-full items-center justify-center bg-white px-6">
  <div class="w-full max-w-md">
    <h1 class="text-4xl font-bold text-[#441752] text-center">Forgot Password</h1>
    <p class="text-base text-[#AAAAAA] text-center mt-2 mb-8">
      Enter your email to receive reset instructions
    </p>

    <form
      [formGroup]="forgotPasswordForm"
      (ngSubmit)="onSubmit()"
      class="w-full flex flex-col items-center"
    >
      <div class="w-full mb-4">
        <div class="relative">
          <i
            class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-[#AAAAAA] text-sm"
          ></i>
          <input
            type="email"
            formControlName="email"
            placeholder="Email"
            class="w-full rounded border-0 bg-[#EEEEF8] py-3 pl-11 pr-4 text-gray-800 placeholder-[#9983A5] focus:outline-none focus:ring-2 focus:ring-[#5B21B6]/30 transition"
          />
        </div>

        @if (
          forgotPasswordForm.get("email")?.invalid &&
          forgotPasswordForm.get("email")?.touched
        ) {
          <p class="text-red-500 text-sm mt-1">Please enter a valid email</p>
        }
      </div>

      <button
        type="submit"
        class="w-full rounded-lg bg-[#441752] py-3 text-xl font-semibold text-white hover:bg-[#612b72] focus:outline-none focus:ring-2 focus:ring-[#5B21B6]/50 transition mb-4"
      >
        Send Reset Link
      </button>
    </form>

    @if (successMessage) {
      <p class="text-green-600 text-sm text-center">{{ successMessage }}</p>
    }

    @if (errorMessage) {
      <p class="text-red-500 text-sm text-center">{{ errorMessage }}</p>
    }

    <p class="text-center text-sm text-gray-400 mt-6">
      Back to
      <a
        routerLink="/login"
        class="text-[#441752] underline hover:no-underline focus:outline-none"
        >Login</a
      >
    </p>
  </div>
</div>
