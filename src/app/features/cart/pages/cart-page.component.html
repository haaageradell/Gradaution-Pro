<section class="mx-auto w-full max-w-[1240px] px-4 pb-14 pt-28">
  <div *ngIf="isLoading" class="flex min-h-[260px] items-center justify-center">
    <div class="h-10 w-10 animate-spin rounded-full border-4 border-[#E8DEEF] border-t-[#4F266E]"></div>
  </div>

  <ng-container *ngIf="!isLoading">
    <div *ngIf="cartItems.length === 0" class="rounded-2xl border border-[#ECE8F3] bg-white p-10 text-center shadow-sm">
      <h1 class="text-3xl font-bold text-[#2D2340]">MY Cart</h1>
      <p class="mt-3 text-sm text-[#7E7391]">Your cart is empty.</p>
    </div>

    <ng-container *ngIf="cartItems.length > 0">
      <div class="grid grid-cols-1 gap-6 lg:grid-cols-[1fr_360px]">
        <div>
          <header class="mb-5 flex items-end justify-between">
            <h1 class="text-3xl font-bold text-[#2D2340]">
              MY Cart
              <span class="text-base font-medium text-[#8A7F9D]">({{ cartItems.length }} items)</span>
            </h1>
          </header>

          <div class="space-y-4">
            <app-cart-item
              *ngFor="let item of cartItems"
              [item]="item"
              (quantityChanged)="onQuantityChange(item.id, $event)"
              (removed)="removeItem(item.id)"
            ></app-cart-item>
          </div>

          <div class="mt-5 rounded-2xl bg-[#4F266E] p-4 text-white shadow-sm">
            <p class="text-sm font-semibold">Discount Offer</p>
            <p class="mt-1 text-xs text-[#DCCEEE]">Get up to 20% off on selected items with your coupon.</p>
          </div>
        </div>

        <div>
          <app-order-summary
            [summary]="summary"
            [coupon]="order?.coupon ?? null"
            [estimatedDelivery]="order?.estimatedDelivery ?? '3-5 Business Days'"
            (couponApplied)="applyCoupon($event)"
            (proceed)="proceedToCheckout()"
          ></app-order-summary>
          <p *ngIf="couponMessage" class="mt-3 text-xs font-semibold text-[#3B9B56]">{{ couponMessage }}</p>
        </div>
      </div>

      <app-similar-products [products]="similarProducts"></app-similar-products>
    </ng-container>
  </ng-container>
</section>
