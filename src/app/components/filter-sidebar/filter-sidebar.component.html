<aside class="sticky top-24 rounded-[14px] bg-white p-4 shadow-[0_4px_18px_rgba(31,20,55,0.08)]">
  <h3 class="text-[14px] font-semibold text-[#261d33]">Filter By</h3>

  <div class="mt-4 border-t border-[#ece8f1] pt-3">
    <button
      type="button"
      class="flex w-full items-center justify-between text-left text-[13px] font-semibold text-[#2f2738]"
      (click)="toggle('category')"
    >
      Category
      <i class="fa-solid text-[11px]" [ngClass]="sections.category ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
    </button>
    <ul *ngIf="sections.category" class="mt-3 space-y-1.5">
      <li *ngFor="let category of categories" class="text-[12px] font-medium text-[#8a8594]">
        {{ category }}
      </li>
    </ul>
  </div>

  <div class="mt-4 border-t border-[#ece8f1] pt-3">
    <button
      type="button"
      class="flex w-full items-center justify-between text-left text-[13px] font-semibold text-[#2f2738]"
      (click)="toggle('color')"
    >
      Color Family
      <i class="fa-solid text-[11px]" [ngClass]="sections.color ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
    </button>
    <div *ngIf="sections.color" class="mt-3 flex flex-wrap gap-2">
      <span class="h-5 w-5 rounded-full border border-[#ddd8e4] bg-[#0f172a]"></span>
      <span class="h-5 w-5 rounded-full border border-[#ddd8e4] bg-[#78350f]"></span>
      <span class="h-5 w-5 rounded-full border border-[#ddd8e4] bg-[#7c3aed]"></span>
      <span class="h-5 w-5 rounded-full border border-[#ddd8e4] bg-[#64748b]"></span>
      <span class="h-5 w-5 rounded-full border border-[#ddd8e4] bg-[#e5e7eb]"></span>
    </div>
  </div>

  <div class="mt-4 border-t border-[#ece8f1] pt-3">
    <button
      type="button"
      class="flex w-full items-center justify-between text-left text-[13px] font-semibold text-[#2f2738]"
      (click)="toggle('price')"
    >
      Price
      <i class="fa-solid text-[11px]" [ngClass]="sections.price ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
    </button>
    <div *ngIf="sections.price" class="mt-3">
      <input
        type="range"
        min="1000"
        max="10000"
        step="500"
        [(ngModel)]="selectedPrice"
        class="h-1.5 w-full cursor-pointer appearance-none rounded-full bg-[#e8e2ef]"
      />
      <p class="mt-2 text-[11px] font-medium text-[#7b7487]">Up to {{ selectedPrice }} EGP</p>
    </div>
  </div>

  <div class="mt-4 border-t border-[#ece8f1] pt-3">
    <button
      type="button"
      class="flex w-full items-center justify-between text-left text-[13px] font-semibold text-[#2f2738]"
      (click)="toggle('discount')"
    >
      Discount Range
      <i class="fa-solid text-[11px]" [ngClass]="sections.discount ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
    </button>
    <div *ngIf="sections.discount" class="mt-3">
      <input
        type="range"
        min="0"
        max="70"
        step="5"
        [(ngModel)]="selectedDiscount"
        class="h-1.5 w-full cursor-pointer appearance-none rounded-full bg-[#e8e2ef]"
      />
      <p class="mt-2 text-[11px] font-medium text-[#7b7487]">Up to {{ selectedDiscount }}%</p>
    </div>
  </div>
</aside>
