<article
  class="group rounded-[16px] bg-white p-3 shadow-[0_4px_18px_rgba(31,20,55,0.08)] transition-all duration-200 hover:-translate-y-1 hover:shadow-[0_10px_28px_rgba(31,20,55,0.14)]"
>
  <div class="relative rounded-[12px] bg-[#f4f4f6] p-4">
    <button
      type="button"
      (click)="toggleWishlist()"
      class="absolute right-3 top-3 inline-flex h-7 w-7 items-center justify-center rounded-full bg-white text-[12px] shadow-[0_2px_8px_rgba(0,0,0,0.12)] transition hover:scale-105"
      [ngClass]="wished ? 'text-[#5a2a82]' : 'text-[#8f8a99]'"
      aria-label="Toggle wishlist"
    >
      <i class="fa-heart" [ngClass]="wished ? 'fa-solid' : 'fa-regular'"></i>
    </button>

    <img
      [src]="product.image || fallbackImage"
      (error)="handleImageError($event)"
      [alt]="product.name"
      class="mx-auto h-[122px] w-full object-contain"
    />

    <button
      type="button"
      class="mt-3 inline-flex rounded-full bg-white px-3 py-1 text-[10px] font-semibold text-[#2e2a35] shadow-[0_2px_8px_rgba(0,0,0,0.1)]"
    >
      Try On
    </button>
  </div>

  <div class="pt-3">
    <h3 class="text-[14px] font-semibold leading-[1.2] text-[#2f2936]">{{ product.name }}</h3>

    <div class="mt-1 flex items-center gap-1">
      <i
        *ngFor="let star of stars"
        class="fa-solid fa-star text-[10px]"
        [ngClass]="star <= product.rating ? 'text-[#f3b447]' : 'text-[#ddd7e5]'"
      ></i>
      <span class="ml-1 text-[11px] font-semibold text-[#3f3749]">{{
        (product.rating ?? 0).toFixed(1)
      }}</span>
    </div>

    <div class="mt-2 flex items-center justify-between gap-2">
      <div class="flex items-end gap-1.5">
        <span class="text-[18px] font-bold leading-none text-[#251b33]">{{ product.price }}</span>
        <span class="pb-0.5 text-[11px] font-medium text-[#bbb6c4] line-through">{{ product.oldPrice }} EGP</span>
      </div>

      <button
        type="button"
        class="inline-flex h-6 w-6 items-center justify-center rounded-full bg-[#4f266e] text-[12px] text-white transition hover:bg-[#5d2d83]"
        aria-label="Add to cart"
      >
        <i class="fa-solid fa-plus"></i>
      </button>
    </div>
  </div>
</article>
